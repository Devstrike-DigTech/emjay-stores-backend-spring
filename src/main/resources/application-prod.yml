spring:
  jpa:
    show-sql: false
    hibernate:
      ddl-auto: validate
  
  devtools:
    restart:
      enabled: false

logging:
  level:
    root: WARN
    com.emjay.backend: INFO
    org.springframework.web: WARN
    org.springframework.security: INFO

server:
  port: ${SERVER_PORT:8080}
  error:
    include-stacktrace: never
    include-exception: false
