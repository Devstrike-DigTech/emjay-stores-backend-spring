spring:
  application:
    name: emjay-backend

  # ── Database ────────────────────────────────────────────────────────────────
  # Railway injects PGHOST, PGPORT, PGDATABASE, PGUSER, PGPASSWORD automatically.
  # Fallbacks are used for local development.
  datasource:
    url: jdbc:postgresql://${PGHOST:localhost}:${PGPORT:5432}/${PGDATABASE:emjay_db}
    username: ${PGUSER:emjay_user}
    password: ${PGPASSWORD:emjay_pass}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 20000
      idle-timeout: 300000
      max-lifetime: 1200000

  # ── JPA ─────────────────────────────────────────────────────────────────────
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
        use_sql_comments: false
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true
    open-in-view: false

  # ── Flyway ──────────────────────────────────────────────────────────────────
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
    schemas: public

  # ── File upload limits ───────────────────────────────────────────────────────
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 20MB

# ── Server ──────────────────────────────────────────────────────────────────
server:
  port: ${PORT:${SERVER_PORT:8080}}
  error:
    include-message: always
    include-binding-errors: always
    include-stacktrace: on_param
    include-exception: false

# ── Logging (verbose for dev — production profile overrides these) ───────────
logging:
  level:
    root: INFO
    com.emjay.backend: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/emjay-backend.log
    max-size: 10MB
    max-history: 30

# ── Swagger / OpenAPI ────────────────────────────────────────────────────────
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    operations-sorter: method
    tags-sorter: alpha
  show-actuator: true

# ── Actuator ─────────────────────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

# ── Cloudinary ───────────────────────────────────────────────────────────────
cloudinary:
  cloud-name: ${CLOUDINARY_CLOUD_NAME}
  api-key: ${CLOUDINARY_API_KEY}
  api-secret: ${CLOUDINARY_API_SECRET}
  folder: ${CLOUDINARY_FOLDER:emjay}

# ── Application ───────────────────────────────────────────────────────────────
application:
  jwt:
    secret: ${JWT_SECRET:emjay-dev-secret-key-change-this-in-production-minimum-256-bits}
    access-token-expiration: ${JWT_ACCESS_EXPIRATION:900000}    # 15 minutes
    refresh-token-expiration: ${JWT_REFRESH_EXPIRATION:604800000} # 7 days

  security:
    password:
      min-length: 8
      require-uppercase: true
      require-lowercase: true
      require-digit: true
      require-special-char: true
    login:
      max-attempts: 5
      lockout-duration: 900000 # 15 minutes
